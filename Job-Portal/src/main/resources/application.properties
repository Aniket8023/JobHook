spring.application.name=Job-Portal

spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=${MONGO_URI}

server.port=${PORT:8080}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jsearch.api.key=${JSEARCH_API_KEY}
jsearch.api.url=https://jsearch.p.rapidapi.com/search

jooble.api.url=${JOOBLE_API_URL}

adzuna.app.id=${ADZUNA_APP_ID}
adzuna.app.key=${ADZUNA_APP_KEY}
adzuna.api.url.template=https://api.adzuna.com/v1/api/jobs/%s/search/1

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

USER_FOUND= User has registered already.
USER_NOT_FOUND= User is not registered.
INVALID_CREDENTIALS=Invalid Credentials.
OTP_NOT_FOUND=OTP is expired.
OTP_INCORRECT=OTP is incorrect.

JOB_NOT_FOUND=Job not found.
JOB_APPLIED_ALREADY=Job applied already.

